# ============================================================
# Optuna 튜닝 설정 - RT-DETR 계열
# ============================================================
# 사용법:
#   python src/tune.py --config configs/tune/tune_rtdetr.yaml
#   python src/tune.py --config configs/tune/tune_rtdetr.yaml --resume
# ============================================================

experiment:
  name: "tune_rtdetr"
  description: "Optuna HPO - RT-DETR 하이퍼파라미터 탐색"
  tags:
    - optuna
    - hpo
    - rt-detr
    - transformer

# --- 모델 (기본값, search_space에서 override) ---
model:
  architecture: "rtdetr-l.pt"
  num_classes: 3
  class_names:
    - person
    - helmet
    - hoist

# --- 데이터 ---
data:
  dataset_yaml: "data/dataset.yaml"
  image_size: 1280
  split_ratio:
    train: 0.8
    val: 0.15
    test: 0.05

# --- 학습 (기본값) ---
train:
  epochs: 500
  batch_size: 4
  optimizer: "AdamW"
  lr0: 0.0001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0001
  warmup_epochs: 5
  patience: 20
  device: "0"
  workers: 4
  seed: 42

# --- 증강 ---
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0
  perspective: 0.0
  flipud: 0
  fliplr: 0.5
  mosaic: 0.0
  close_mosaic: 0
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.0

# --- MLflow ---
mlflow:
  tracking_uri: "./mlflow_runs"
  experiment_name: "dongyang-object-detection"

# --- DVC ---
dvc:
  remote: "local"
  remote_path: "./dvc_storage"

# --- 추론 ---
inference:
  conf_threshold: 0.5
  iou_threshold: 0.45
  max_det: 300
  half: true

# ============================================================
# Optuna 튜닝 설정
# ============================================================
tune:
  n_trials: 20
  direction: "maximize"
  metric: "metrics/mAP50(B)"
  epochs_per_trial: 50
  patience_per_trial: 10
  study_db: "optuna_study_rtdetr.db"

  search_space:
    # RT-DETR 모델 아키텍처
    architecture:
      type: categorical
      choices: ["rtdetr-l.pt", "rtdetr-x.pt"]

    # 학습 파라미터 (Transformer 특성에 맞는 범위)
    lr0:
      type: float
      low: 0.00001
      high: 0.001
      log: true
    batch_size:
      type: categorical
      choices: [2, 4, 8]
    warmup_epochs:
      type: int
      low: 3
      high: 10
    weight_decay:
      type: float
      low: 0.00005
      high: 0.001
      log: true

    # 증강 파라미터 (RT-DETR는 보수적으로)
    scale:
      type: float
      low: 0.0
      high: 0.5
    fliplr:
      type: float
      low: 0.0
      high: 0.5
    hsv_s:
      type: float
      low: 0.3
      high: 0.9
    hsv_v:
      type: float
      low: 0.2
      high: 0.6
