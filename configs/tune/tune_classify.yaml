# ============================================================
# Optuna 튜닝 설정 - Classification
# ============================================================
# 사용법:
#   python src/tune.py --config configs/tune/tune_classify.yaml
#   python src/tune.py --config configs/tune/tune_classify.yaml --resume
#
# 튜닝 완료 후 최적 파라미터로 본 학습:
#   python src/train.py --config configs/best_params_tune_yolo11_cls.yaml
# ============================================================

experiment:
  name: "tune_yolo11_cls"
  description: "Optuna HPO - YOLOv11 Classification 하이퍼파라미터 탐색"
  tags:
    - optuna
    - hpo
    - yolo11-cls
    - classification

# --- 모델 (기본값, search_space에서 override) ---
model:
  architecture: "yolo11n-cls.pt"
  num_classes: 3
  class_names:
    - person
    - helmet
    - hoist

# --- 데이터 ---
data:
  task: "classify"
  image_size: 224
  split_ratio:
    train: 0.8
    val: 0.15
    test: 0.05

# --- 학습 (기본값, search_space에서 override) ---
train:
  epochs: 100
  batch_size: 32
  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  device: "0"
  workers: 8
  seed: 42

# --- 증강 (Classification용 — mosaic/mixup/copy_paste 미사용) ---
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  erasing: 0.4

# --- MLflow ---
mlflow:
  tracking_uri: "./mlflow_runs"
  experiment_name: "dongyang-classification"

# --- 추론 ---
inference:
  conf_threshold: 0.5

# ============================================================
# Optuna 튜닝 설정
# ============================================================
tune:
  n_trials: 20
  direction: "maximize"
  metric: "metrics/accuracy_top1"       # Classification 최적화 대상
  epochs_per_trial: 30                  # trial당 학습 에폭
  patience_per_trial: 10
  study_db: "optuna_study_classify.db"

  # 탐색 공간 정의
  search_space:
    # 모델 아키텍처
    architecture:
      type: categorical
      choices: ["yolo11n-cls.pt", "yolo11s-cls.pt", "yolo11m-cls.pt", "yolo11l-cls.pt"]

    # 학습 파라미터
    lr0:
      type: float
      low: 0.0001
      high: 0.01
      log: true
    batch_size:
      type: categorical
      choices: [16, 32, 64]
    optimizer:
      type: categorical
      choices: ["SGD", "AdamW"]
    warmup_epochs:
      type: int
      low: 1
      high: 5
    weight_decay:
      type: float
      low: 0.0001
      high: 0.001
      log: true

    # 증강 파라미터
    scale:
      type: float
      low: 0.0
      high: 0.9
    erasing:
      type: float
      low: 0.0
      high: 0.5
    fliplr:
      type: float
      low: 0.0
      high: 1.0
