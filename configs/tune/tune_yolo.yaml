# ============================================================
# Optuna 튜닝 설정 - YOLO 계열
# ============================================================
# 사용법:
#   python src/tune.py --config configs/tune/tune_yolo.yaml
#   python src/tune.py --config configs/tune/tune_yolo.yaml --resume
#
# 튜닝 완료 후 최적 파라미터로 본 학습:
#   python src/train.py --config configs/best_params_tune_yolo11.yaml
# ============================================================

experiment:
  name: "tune_yolo11"
  description: "Optuna HPO - YOLOv11 모델 크기 + 하이퍼파라미터 탐색"
  tags:
    - optuna
    - hpo
    - yolo11

# --- 모델 (기본값, search_space에서 override) ---
model:
  architecture: "yolo11n.pt"
  num_classes: 3
  class_names:
    - person
    - helmet
    - hoist

# --- 데이터 ---
data:
  dataset_yaml: "data/dataset.yaml"
  image_size: 1536
  split_ratio:
    train: 0.8
    val: 0.15
    test: 0.05

# --- 학습 (기본값, search_space에서 override) ---
train:
  epochs: 500
  batch_size: 8
  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  device: "0"
  workers: 8
  seed: 42

# --- 증강 (기본값, search_space에서 override) ---
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0
  translate: 0.1
  scale: 0.3
  shear: 0
  perspective: 0.0
  flipud: 0
  fliplr: 0.5
  mosaic: 0.2
  close_mosaic: 30
  mixup: 0
  copy_paste: 0.3
  erasing: 0.2

# --- MLflow ---
mlflow:
  tracking_uri: "./mlflow_runs"
  experiment_name: "dongyang-object-detection"

# --- DVC ---
dvc:
  remote: "local"
  remote_path: "./dvc_storage"

# --- 추론 ---
inference:
  conf_threshold: 0.5
  iou_threshold: 0.45
  max_det: 100
  half: true

# ============================================================
# Optuna 튜닝 설정
# ============================================================
tune:
  n_trials: 20                        # 총 trial 수
  direction: "maximize"               # mAP50 최대화
  metric: "metrics/mAP50(B)"          # 최적화 대상 메트릭
  epochs_per_trial: 50                # trial당 학습 에폭 (본 학습보다 짧게)
  patience_per_trial: 10              # trial당 early stopping patience
  study_db: "optuna_study.db"         # SQLite DB 파일 (중단/재개 지원)

  # 탐색 공간 정의
  # type: float (suggest_float), int (suggest_int), categorical (suggest_categorical)
  # float/int: low, high 필수. log: true면 로그 스케일 탐색
  # categorical: choices 리스트 필수
  search_space:
    # 모델 아키텍처
    architecture:
      type: categorical
      choices: ["yolo11n.pt", "yolo11s.pt", "yolo11m.pt", "yolo11l.pt"]

    # 학습 파라미터
    lr0:
      type: float
      low: 0.0001
      high: 0.01
      log: true
    batch_size:
      type: categorical
      choices: [4, 8, 16]          # imgsz=1536 + yolo11l 기준 24GB VRAM 안전 범위
    optimizer:
      type: categorical
      choices: ["SGD", "AdamW"]
    warmup_epochs:
      type: int
      low: 1
      high: 5
    weight_decay:
      type: float
      low: 0.0001
      high: 0.001
      log: true

    # 증강 파라미터
    mosaic:
      type: float
      low: 0.0
      high: 1.0
    mixup:
      type: float
      low: 0.0
      high: 0.3
    scale:
      type: float
      low: 0.0
      high: 0.9
    copy_paste:
      type: float
      low: 0.0
      high: 0.5
    erasing:
      type: float
      low: 0.0
      high: 0.5
