# ============================================================
# Classification 실험 설정
# 용도: train.py에서 로드하여 이미지 분류 학습
# ============================================================
# 사용법:
#   python src/dataset.py --config configs/yolo_classify.yaml
#   python src/train.py --config configs/yolo_classify.yaml
#   python src/eval.py --config configs/yolo_classify.yaml
# ============================================================

experiment:
  name: "yolo11m_cls"
  description: "YOLOv11m Classification 기본 학습"
  tags:
    - yolo11m-cls
    - classification

# --- 모델 ---
model:
  architecture: "yolo11m-cls.pt"      # yolo11n-cls / yolo11s-cls / yolo11m-cls / yolo11l-cls
  num_classes: 3
  class_names:
    - person
    - helmet
    - hoist

# --- 데이터 ---
data:
  task: "classify"                     # detect | pose | classify
  image_size: 224
  split_ratio:
    train: 0.8
    val: 0.15
    test: 0.05

# --- 학습 ---
train:
  epochs: 100
  batch_size: 32
  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  device: "0"
  workers: 8
  seed: 42

# --- 증강 (Classification용 — mosaic/mixup/copy_paste 미사용) ---
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  erasing: 0.4

# --- MLflow ---
mlflow:
  tracking_uri: "./mlflow_runs"
  experiment_name: "dongyang-classification"

# --- 추론 ---
inference:
  conf_threshold: 0.5
